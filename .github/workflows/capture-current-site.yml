name: Capture current public product surfaces

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/capture-current-site.yml
      - README.md
      - docs/product-surfaces.md

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Capture current live product surfaces
        run: |
          mkdir -p captured-product-surfaces
          node <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              viewport: { width: 1440, height: 1000 },
              deviceScaleFactor: 1,
            });

            await page.emulateMedia({ reducedMotion: 'reduce' });
            await page.goto('https://darrowcode.com/', {
              waitUntil: 'networkidle',
              timeout: 90000,
            });
            await page.addStyleTag({
              content: `
                *, *::before, *::after {
                  animation-duration: 0s !important;
                  animation-delay: 0s !important;
                  transition-duration: 0s !important;
                  caret-color: transparent !important;
                }
              `,
            });
            await page.waitForTimeout(1500);

            await page.screenshot({
              path: 'captured-product-surfaces/current-home-hero.png',
              clip: { x: 0, y: 0, width: 1440, height: 1000 },
            });

            const selector = page.locator('#product-selector').first();
            await selector.waitFor({ state: 'visible', timeout: 30000 });
            const box = await selector.boundingBox();
            if (!box) throw new Error('Product selector bounding box is unavailable');

            const documentHeight = await page.evaluate(() => document.documentElement.scrollHeight);
            const clipY = Math.max(0, Math.floor(box.y - 80));
            const clipHeight = Math.min(1120, documentHeight - clipY);
            await page.screenshot({
              path: 'captured-product-surfaces/current-product-selector.png',
              clip: { x: 0, y: clipY, width: 1440, height: clipHeight },
            });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify image files
        run: |
          file captured-product-surfaces/current-home-hero.png
          file captured-product-surfaces/current-product-selector.png
          test -s captured-product-surfaces/current-home-hero.png
          test -s captured-product-surfaces/current-product-selector.png

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-product-surfaces
          path: captured-product-surfaces/*.png
          if-no-files-found: error
          retention-days: 7
