name: Capture current public product surfaces

on:
  push:
    branches:
      - fix/replace-legacy-product-visuals
    paths:
      - .github/workflows/capture-current-site.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out capture branch
        uses: actions/checkout@v4
        with:
          ref: fix/replace-legacy-product-visuals

      - name: Install browser and media tooling
        run: |
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y ffmpeg webp

      - name: Capture current live product surfaces
        run: |
          rm -rf captured-product-surfaces
          mkdir -p captured-product-surfaces/video assets/product
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const URL = 'https://darrowcode.com/';
          const pause = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function prepare(page) {
            await page.goto(URL, { waitUntil: 'domcontentloaded', timeout: 90000 });
            await page.waitForLoadState('networkidle', { timeout: 20000 }).catch(() => {});
            await page.emulateMedia({ reducedMotion: 'reduce' });
            await page.addStyleTag({ content: `
              *, *::before, *::after {
                animation-duration: 0s !important;
                animation-delay: 0s !important;
                transition-duration: 0s !important;
                caret-color: transparent !important;
              }
              html { scroll-behavior: auto !important; }
            ` });

            for (const label of ['Essential only', 'Allow analytics']) {
              const button = page.getByRole('button', { name: label, exact: false }).first();
              if (await button.count()) await button.click({ timeout: 3000 }).catch(() => {});
            }

            await page.evaluate(() => window.scrollTo(0, 0));
            await pause(1800);
          }

          async function scrollToProductSelector(page) {
            const heading = page.getByText('Choose your personal astrology PDF', { exact: false }).first();
            await heading.waitFor({ state: 'visible', timeout: 30000 });
            await heading.scrollIntoViewIfNeeded();
            await page.evaluate(() => window.scrollBy(0, -100));
            await pause(1200);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            const desktop = await browser.newPage({
              viewport: { width: 1440, height: 1000 },
              deviceScaleFactor: 1,
            });
            await prepare(desktop);
            console.log('Desktop title:', await desktop.title());
            console.log('Desktop scroll height:', await desktop.evaluate(() => document.documentElement.scrollHeight));
            await desktop.screenshot({
              path: 'captured-product-surfaces/current-home-hero.png',
              fullPage: false,
            });

            await scrollToProductSelector(desktop);
            await desktop.screenshot({
              path: 'captured-product-surfaces/current-product-selector.png',
              fullPage: false,
            });

            const mobile = await browser.newPage({
              viewport: { width: 390, height: 844 },
              deviceScaleFactor: 1,
              isMobile: true,
              hasTouch: true,
            });
            await prepare(mobile);
            await mobile.screenshot({
              path: 'captured-product-surfaces/current-home-mobile.png',
              fullPage: false,
            });

            const videoContext = await browser.newContext({
              viewport: { width: 1280, height: 800 },
              recordVideo: {
                dir: 'captured-product-surfaces/video',
                size: { width: 1280, height: 800 },
              },
            });
            const videoPage = await videoContext.newPage();
            await prepare(videoPage);
            await pause(2200);
            const maxScroll = await videoPage.evaluate(() => Math.max(0, Math.min(
              document.documentElement.scrollHeight - window.innerHeight,
              3600,
            )));
            const steps = 155;
            for (let i = 0; i <= steps; i += 1) {
              const t = i / steps;
              const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
              await videoPage.evaluate((y) => window.scrollTo(0, y), Math.round(maxScroll * eased));
              await pause(85);
            }
            await pause(2200);
            await videoPage.close();
            await videoContext.close();

            await browser.close();

            for (const file of [
              'captured-product-surfaces/current-home-hero.png',
              'captured-product-surfaces/current-product-selector.png',
              'captured-product-surfaces/current-home-mobile.png',
            ]) {
              if (!fs.existsSync(file) || fs.statSync(file).size < 10000) {
                throw new Error(`Capture is missing or too small: ${file}`);
              }
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Optimize screenshots and video
        run: |
          cwebp -quiet -q 86 captured-product-surfaces/current-home-hero.png -o assets/product/current-home-hero.webp
          cwebp -quiet -q 86 captured-product-surfaces/current-product-selector.png -o assets/product/current-product-selector.webp
          cwebp -quiet -q 86 captured-product-surfaces/current-home-mobile.png -o assets/product/current-home-mobile.webp
          cp assets/product/current-home-hero.webp assets/product/current-site-walkthrough-poster.webp
          VIDEO_SOURCE="$(find captured-product-surfaces/video -type f -name '*.webm' | head -n 1)"
          test -n "$VIDEO_SOURCE"
          ffmpeg -y -i "$VIDEO_SOURCE" -an -vf "scale=1280:-2" -c:v libx264 -preset slow -crf 29 -pix_fmt yuv420p -movflags +faststart assets/product/current-site-walkthrough.mp4

      - name: Verify generated assets
        run: |
          test -s assets/product/current-home-hero.webp
          test -s assets/product/current-product-selector.webp
          test -s assets/product/current-home-mobile.webp
          test -s assets/product/current-site-walkthrough-poster.webp
          test -s assets/product/current-site-walkthrough.mp4
          file assets/product/current-*
          du -h assets/product/current-*
          test "$(stat -c%s assets/product/current-site-walkthrough.mp4)" -lt 12582912

      - name: Commit generated product assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/product/current-home-hero.webp \
                  assets/product/current-product-selector.webp \
                  assets/product/current-home-mobile.webp \
                  assets/product/current-site-walkthrough-poster.webp \
                  assets/product/current-site-walkthrough.mp4
          git diff --cached --quiet && exit 0
          git commit -m "assets: refresh current product captures"
          git push origin HEAD:fix/replace-legacy-product-visuals
