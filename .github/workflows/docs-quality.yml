name: Documentation quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Markdown formatting and internal links
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path.cwd().resolve()
          failures = []
          link_pattern = re.compile(r"!?\[[^\]]*\]\(([^)]+)\)")

          for document in sorted(root.rglob("*.md")):
              relative = document.relative_to(root)
              text = document.read_text(encoding="utf-8")
              lines = text.splitlines()

              if any(line.endswith((" ", "\t")) for line in lines):
                  failures.append(f"{relative}: trailing whitespace")
              if any("\t" in line for line in lines):
                  failures.append(f"{relative}: tab character")

              headings = [
                  len(match.group(1))
                  for line in lines
                  if (match := re.match(r"^(#+)\s+\S", line))
              ]
              if not headings or headings[0] != 1:
                  failures.append(f"{relative}: first heading must be level 1")
              if headings.count(1) != 1:
                  failures.append(f"{relative}: expected exactly one level-1 heading")
              if any(current > previous + 1 for previous, current in zip(headings, headings[1:])):
                  failures.append(f"{relative}: heading level skipped")

              for raw_target in link_pattern.findall(text):
                  target = raw_target.strip().split()[0].strip("<>")
                  if not target or target.startswith(("#", "http://", "https://", "mailto:")):
                      continue
                  path_part = target.split("#", 1)[0]
                  destination = (document.parent / path_part).resolve()
                  if root not in destination.parents and destination != root:
                      failures.append(f"{relative}: link leaves repository: {target}")
                  elif not destination.exists():
                      failures.append(f"{relative}: missing link target: {target}")

          if failures:
              print("\n".join(failures))
              sys.exit(1)

          print("Markdown structure and internal links are valid.")
          PY

      - name: Enforce public-repository boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path.cwd()
          failures = []
          forbidden = {
              "private repository suffix": re.compile(r"617bca75", re.I),
              "private repository name": re.compile(r"darrow-code-insight-617bca75", re.I),
              "local workspace path": re.compile(r"(?:[A-Z]:[\\/]|/home/|/Users/|/mnt/)", re.I),
              "legacy product tagline": re.compile(r"Personal orientation for a better quality of life", re.I),
              "OpenAI-style secret": re.compile(r"\bsk-(?:proj-)?[A-Za-z0-9_-]{20,}"),
              "Stripe secret": re.compile(r"\b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{16,}"),
              "JWT-shaped token": re.compile(r"\beyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b"),
          }

          allowed_suffixes = {
              ".md", ".yml", ".yaml", ".json", ".ts", ".tsx", ".js", ".mjs", ".svg", ".txt", ".gitignore"
          }

          for path in sorted(p for p in root.rglob("*") if p.is_file() and ".git" not in p.parts):
              if path.name.startswith(".env"):
                  failures.append(f"{path}: environment file must not be committed")
                  continue
              if path.suffix.lower() not in allowed_suffixes and path.name != ".gitignore":
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for label, pattern in forbidden.items():
                  if pattern.search(text):
                      failures.append(f"{path}: contains {label}")

          if failures:
              print("\n".join(failures))
              sys.exit(1)

          print("Public repository boundary checks are clean.")
          PY
